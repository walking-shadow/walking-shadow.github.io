short_bio: >-
  I am Sijie Zhao. I received my M.S. degree from Nanjing University, where I worked under the supervision of Prof. <a href="https://scholar.google.com/citations?user=0klWOSEAAAAJ&hl=zh-CN&oi=ao">Xueliang Zhang</a> and Prof. <a href="https://scholar.google.com/citations?user=qBUD3u4AAAAJ&hl=zh-CN&oi=ao">Pengfeng Xiao</a>. I will join the University of Tokyo as a Ph.D. student, advised by Prof. <a href="https://scholar.google.co.jp/citations?user=DJ2KOn8AAAAJ&hl=en">Naoto Yokoya</a>. My current research interests include remote sensing agents, geospatial reasoning, disaster remote sensing, and Earth observation. Feel free to send me an email if you would like to chat with me for any reason.
